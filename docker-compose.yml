services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  odoo:
    image: ${ODOO_IMAGE:-odoo:19.0}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${ODOO_PORT:-8069}:8069"
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo
    volumes:
      - ./config/odoo.conf:/etc/odoo/odoo.conf:ro
      - ./odoo/addons:/mnt/odoo/addons:ro
      - ./odoo/extra-addons:/mnt/odoo/extra-addons
      - ./custom_addons:/mnt/custom_addons
      - odoo-web-data:/var/lib/odoo
    command: ["odoo", "-c", "/etc/odoo/odoo.conf"]
    restart: unless-stopped

volumes:
  odoo-db-data:
  odoo-web-data:
